<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Итоги сессий ИННОПРОМ. Беларусь</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #ffffff;
    color: #333;
    line-height: 1.6;
    min-height: 100vh;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px 80px;
  }

  .cards-grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .card {
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 30px;
    padding: 24px 28px;
    transition: box-shadow .2s, border-color .2s;
    cursor: pointer;
  }
  .card:hover {
    box-shadow: 0 2px 12px rgba(0,0,0,.08);
    border-color: #d0d0d0;
  }

  .card-title {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 8px;
    color: #1a1a1a;
  }
  .card-date {
    font-size: 14px;
    font-weight: 600;
    color: #4495D1;
    margin-bottom: 12px;
  }
  .card-preview {
    font-size: 14px;
    color: #555;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .card-link {
    font-size: 14px;
    font-weight: 600;
    color: #4495D1;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .card-link:hover { text-decoration: underline; color: #ed0f73; }

  #detail-view { display: none; }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 600;
    color: #4495D1;
    margin-bottom: 28px;
    cursor: pointer;
    border: none;
    background: none;
    padding: 0;
  }
  .back-btn:hover { text-decoration: underline; color: #ed0f73; }

  .detail-title {
    font-size: 24px;
    font-weight: 800;
    line-height: 1.3;
    margin-bottom: 8px;
    color: #1a1a1a;
  }
  .detail-date {
    font-size: 14px;
    font-weight: 600;
    color: #4495D1;
    margin-bottom: 24px;
    display: block;
  }
  .detail-content {
    background: #fff;
    border: 1px solid #e5e5e5;
    border-radius: 4px;
    padding: 32px;
    font-size: 15px;
    line-height: 1.75;
    white-space: pre-wrap;
    color: #333;
  }
  .detail-content .section-heading {
    font-size: 16px;
    font-weight: 700;
    color: #1a1a1a;
    margin-top: 24px;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 2px solid #4495D1;
  }
  .detail-content .section-heading:first-child { margin-top: 0; }
  .detail-content .bullet-item {
    padding: 6px 0 6px 18px;
    position: relative;
    color: #444;
  }
  .detail-content .bullet-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 14px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4495D1;
  }
  .detail-content .plain-text { color: #444; margin-bottom: 6px; }
  .detail-content .paragraph-gap { height: 1.2em; margin: 0; }
  .detail-content .speakers-section { margin-top: 24px; }
  .detail-content .speaker-bullet {
    padding: 6px 0 6px 18px;
    position: relative;
    color: #444;
  }
  .detail-content .speaker-bullet::before {
    content: '•';
    position: absolute;
    left: 0;
    color: #4495D1;
    font-weight: 700;
  }
  .detail-content .speaker-moderator {
    padding: 6px 0 6px 0 !important;
    margin-top: 8px;
    color: #444;
    padding-left: 0 !important;
    list-style: none !important;
  }
  .detail-content .speaker-moderator::before {
    content: none !important;
    display: none !important;
  }

  .loading {
    text-align: center;
    padding: 80px 20px;
    color: #888;
    font-size: 15px;
  }
  .loading .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #e5e5e5;
    border-top-color: #4495D1;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .detail-title { font-size: 20px; }
    .detail-content { padding: 24px; }
  }
</style>
</head>
<body>

<div class="container">
  <div id="cards-view">
    <div class="loading" id="loader">
      <div class="spinner"></div>
      Загрузка сессий...
    </div>
    <div class="cards-grid" id="cards-grid"></div>
  </div>

  <div id="detail-view">
    <button class="back-btn" type="button" id="back-btn">← Назад к списку</button>
    <h2 class="detail-title" id="detail-title"></h2>
    <span class="detail-date" id="detail-date"></span>
    <div class="detail-content" id="detail-content"></div>
  </div>
</div>

<script>
const AIRTABLE_TOKEN = 'patifK5MrTwayqjOD.ae57b8e77f4323222ed0023c4550bee4c9691a93ad4ac649af76f43fb10a4c97';
const BASE_ID = 'appx8BTATPq5SLTLE';
const TABLE_ID = 'tblrPgG9OArUNtnNt';
let records = [];

const DEMO_RECORDS = [{
  id: 'demo1',
  fields: {
    'Название сессии': 'Комплексная цифровизация производства: эффективные экосистемы для ведущих отраслей',
    'Резюме сессии': 'Комплексная цифровизация производства. Ключевые тезисы: Трансмашхолдинг — 60 тыс. мест, 1С ERP; Атлант — 1С ERP 2, цепочка поставок; Ивацевичдрев — трудозатраты -20%; Борисовский завод Металлист — цикл +20%. Выводы: прибыль +12%, простои -11%, брак -15%.',
    'Спикеры': 'Алексей Нестеров (1С)\nАнатолий Ушаков (Трансмашхолдинг)\nАлександр Стадольник (АТЛАНТ)\nНаталья Ильницкая (Ивацевичдрев)'
  }
}];

async function loadRecords() {
  try {
    const res = await fetch(
      `https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}`,
      { headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` } }
    );
    const data = await res.json();
    records = (data.records || []).filter(r => r.fields && Object.keys(r.fields).length > 0);
    if (!records.length) records = DEMO_RECORDS;
    if (records[0]) console.log('[Airtable] Field names:', Object.keys(records[0].fields));
    renderCards();
  } catch (e) {
    records = DEMO_RECORDS;
    renderCards();
  }
}

function getField(rec, name) { return rec.fields[name] || ''; }

function getFieldAny(rec, ...names) {
  for (const n of names) {
    const v = rec.fields[n];
    if (v !== undefined && v !== null && v !== '') return v;
  }
  return '';
}

function getDateField(rec) {
  const known = getFieldAny(rec, 'Дата', 'Дата проведения', 'Дата сессии', 'Date', 'дата');
  if (known) return known;
  for (const [key, val] of Object.entries(rec.fields || {})) {
    if (!val) continue;
    const s = String(val).trim();
    if (/^\d{4}-\d{2}-\d{2}/.test(s) || /^\d{2}\.\d{2}\.\d{4}/.test(s)) return s;
  }
  return '';
}

function formatDate(s) {
  if (!s) return '';
  let str = String(s).trim();
  const dmY = str.match(/(\d{1,2})\.(\d{1,2})\.(\d{4})/);
  if (dmY) str = dmY[3] + '-' + dmY[2].padStart(2,'0') + '-' + dmY[1].padStart(2,'0');
  const datePart = str.split('T')[0].split(' ')[0] || str;
  const d = new Date(datePart);
  const m = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  return `${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()}`;
}

function getPreviewText(t) {
  if (!t) return '';
  const c = String(t).trim();
  return c.length > 140 ? c.substring(0, 140) + '...' : c;
}

function getSpeakersList(speakersField, fromПересказ) {
  const parseItems = (raw) => {
    const byNewline = raw.split(/\n/).map(s => s.trim()).filter(Boolean);
    if (byNewline.length > 1) return byNewline;
    const bySemicolon = raw.split(/\s*;\s*/).map(s => s.trim()).filter(Boolean);
    if (bySemicolon.length > 1) return bySemicolon;
    const byComma = raw.split(/\s*,\s*/).map(s => s.trim()).filter(Boolean);
    return byComma.length > 0 ? byComma : (raw ? [raw] : []);
  };
  let items = [];
  if (speakersField) items = parseItems(String(speakersField).trim());
  else if (fromПересказ) {
    const m = fromПересказ.match(/СПИКЕРЫ[:\s]*([\s\S]*?)(?=\n\n|$)/i);
    if (m) items = parseItems(m[1].replace(/\n/g, ' ').trim());
  }
  const speakers = [], moderators = [];
  const isMod = (str) => /^\s*(\u041C\u043E\u0434\u0435\u0440\u0430\u0442\u043E\u0440|Moderator)\s*[::\s]/i.test(String(str).trimStart());
  for (const s of items) {
    if (isMod(s)) moderators.push(s);
    else speakers.push(s);
  }
  return { speakers, moderators };
}

function renderCards() {
  document.getElementById('loader').style.display = 'none';
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';
  if (!records.length) {
    grid.innerHTML = '<p style="color:#888;text-align:center;padding:40px">Сессии пока не добавлены</p>';
    return;
  }
  records.forEach((rec, i) => {
    const title = getFieldAny(rec, 'Название сессии', 'Название');
    const summary = getFieldAny(rec, 'Резюме сессии', 'Пересказ', 'Итоги');
    const date = getDateField(rec);
    const dateText = date ? formatDate(date) : 'Дата не указана';
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => showDetail(i);
    card.innerHTML = `
      <div class="card-title">${title}</div>
      <div class="card-date">${dateText}</div>
      <div class="card-preview">${getPreviewText(summary)}</div>
      <span class="card-link">Подробнее →</span>
    `;
    grid.appendChild(card);
  });
}

function buildDetailContent(summary, speakers, speakersFromText) {
  let html = '<div class="section-heading">Резюме сессии</div>';
  let summaryText = (summary || '').replace(/\n\s*СПИКЕРЫ[:\s]*[\s\S]*/i, '').trim();
  if (summaryText) {
    let paragraphs = String(summaryText).split(/\n\s*\n/).map(p => p.trim()).filter(Boolean);
    if (paragraphs.length === 1 && paragraphs[0].length > 350) {
      const sentences = paragraphs[0].split(/(?<=[.!?])\s+/).filter(Boolean);
      if (sentences.length > 1) {
        const chunks = [];
        for (let i = 0; i < sentences.length; i += 3) chunks.push(sentences.slice(i, i + 3).join(' '));
        paragraphs = chunks;
      }
    }
    for (let i = 0; i < paragraphs.length; i++) {
      if (i > 0) html += '<div class="paragraph-gap"></div>';
      const lines = paragraphs[i].split('\n');
      for (const line of lines) {
        const t = line.trim();
        if (!t) continue;
        if (/^[•\-]\s*/.test(t)) html += `<div class="bullet-item">${t.replace(/^[•\-]\s*/, '')}</div>`;
        else html += `<div class="plain-text">${t}</div>`;
      }
    }
  } else {
    html += '<div class="plain-text">Резюме пока не добавлено</div>';
  }
  const { speakers: speakerList, moderators: moderatorList } = getSpeakersList(speakers, speakersFromText);
  if (speakerList.length || moderatorList.length) {
    html += '<div class="section-heading speakers-section">Спикеры</div>';
    html += speakerList.map(s => `<div class="speaker-bullet">${s}</div>`).join('');
    html += moderatorList.map(m => `<div class="speaker-moderator" style="padding-left:0!important">${m}</div>`).join('');
  }
  return html;
}

function showDetail(idx) {
  const rec = records[idx];
  const title = getFieldAny(rec, 'Название сессии', 'Название');
  const summary = getFieldAny(rec, 'Резюме сессии', 'Пересказ', 'Итоги');
  const speakers = getFieldAny(rec, 'Спикеры', 'Спикер');
  const date = getDateField(rec);
  document.getElementById('detail-title').textContent = title;
  const dateEl = document.getElementById('detail-date');
  if (date) {
    dateEl.textContent = formatDate(date);
    dateEl.style.display = 'block';
  } else {
    dateEl.style.display = 'none';
  }
  document.getElementById('detail-content').innerHTML = buildDetailContent(summary, speakers, summary);
  document.getElementById('cards-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  window.scrollTo(0, 0);
}

function showCards() {
  document.getElementById('detail-view').style.display = 'none';
  document.getElementById('cards-view').style.display = 'block';
  window.scrollTo(0, 0);
}

document.getElementById('back-btn').onclick = showCards;
loadRecords();
</script>
</body>
</html>
